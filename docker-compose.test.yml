services:
  test-db:
    image: postgres:16
    environment:
      POSTGRES_DB: st6_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d st6_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-runner:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./backend:/app
      - maven-cache:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://test-db:5432/st6_test
      SPRING_DATASOURCE_USERNAME: test
      SPRING_DATASOURCE_PASSWORD: test
      APP_JWT_SECRET: test-jwt-secret-key-that-is-at-least-32-characters-long
      APP_JWT_EXPIRATION_MS: "3600000"
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173
      APP_RATE_LIMIT_REQUESTS_PER_MINUTE: "100"
    depends_on:
      test-db:
        condition: service_healthy
    command: mvn test --no-transfer-progress

volumes:
  maven-cache:
